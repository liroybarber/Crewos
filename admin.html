<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CrewOS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;--border2:#333;
  --text:#e8e8e8;--muted:#666;--accent:#f0a500;--red:#e03a3a;--green:#3ae08a;--blue:#3a8ae0;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
#pg-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#1a1000,var(--bg) 70%);}
.login-box{width:100%;max-width:380px;padding:20px;}
.login-logo{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:36px;font-family:var(--mono);}
.login-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:var(--mono);}
.login-input{width:100%;height:48px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:15px;padding:0 16px;letter-spacing:4px;outline:none;transition:border-color .15s;}
.login-input:focus{border-color:var(--accent);}
.login-err{font-size:12px;color:var(--red);min-height:20px;margin:10px 0;font-family:var(--mono);}
.login-btn{width:100%;height:48px;background:var(--accent);border:none;border-radius:6px;color:#000;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.login-btn:hover{opacity:.85;}
#pg-admin{display:none;min-height:100vh;flex-direction:column;}
#pg-admin.on{display:flex;}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:var(--mono);font-size:16px;font-weight:700;}
.topbar-logo span{color:var(--accent);}
.topbar-tag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border2);padding:3px 8px;border-radius:4px;letter-spacing:1px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-time{font-family:var(--mono);font-size:11px;color:var(--muted);}
.btn-logout{height:32px;padding:0 14px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:11px;border-radius:4px;cursor:pointer;transition:all .15s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.admin-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;overflow-y:auto;}
.sidebar-section{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:0 20px;margin-bottom:8px;margin-top:20px;}
.sidebar-section:first-child{margin-top:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .12s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);background:rgba(240,165,0,.06);border-left-color:var(--accent);}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--accent);color:#000;font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center;}
.main{flex:1;overflow-y:auto;padding:28px 32px;}
.page-header{margin-bottom:24px;}
.page-title{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.page-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px;}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.table-title{font-family:var(--mono);font-size:13px;font-weight:600;}
.btn-sm{height:30px;padding:0 12px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid;}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-primary:hover{opacity:.85;}
.btn-outline{background:transparent;color:var(--muted);border-color:var(--border2);}
.btn-outline:hover{color:var(--text);border-color:var(--text);}
table{width:100%;border-collapse:collapse;}
th{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:10px 18px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);font-weight:600;}
td{padding:12px 18px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.td-mono{font-family:var(--mono);font-size:12px;}
.td-muted{color:var(--muted);font-size:12px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:600;}
.badge-green{background:rgba(58,224,138,.1);color:var(--green);border:1px solid rgba(58,224,138,.2);}
.badge-yellow{background:rgba(240,165,0,.1);color:var(--accent);border:1px solid rgba(240,165,0,.2);}
.badge-blue{background:rgba(58,138,224,.1);color:var(--blue);border:1px solid rgba(58,138,224,.2);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;}
.detail-card-title{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:12px;color:var(--muted);}
.detail-val{font-family:var(--mono);font-size:12px;font-weight:600;}
.search-bar{width:100%;height:40px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:0 14px;outline:none;margin-bottom:16px;transition:border-color .15s;}
.search-bar:focus{border-color:var(--accent);}
.loading{text-align:center;padding:48px;color:var(--muted);font-family:var(--mono);font-size:13px;}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:13px;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab{padding:10px 20px;font-family:var(--mono);font-size:12px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .12s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.backup-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:24px;}
.backup-title{font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:6px;}
.backup-desc{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.backup-btn{height:44px;padding:0 24px;background:var(--accent);border:none;border-radius:6px;color:#000;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.backup-btn:hover{opacity:.85;}
.backup-btn:disabled{opacity:.4;cursor:not-allowed;}
.backup-msg{font-family:var(--mono);font-size:12px;min-height:20px;margin-top:12px;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<div id="pg-login">
  <div class="login-box">
    <div class="login-logo">CREW<span>OS</span></div>
    <div class="login-sub">// ADMIN PANEL</div>
    <div class="login-label">Admin Password</div>
    <input type="password" id="adm-pass" class="login-input" placeholder="••••••••" maxlength="32" onkeydown="if(event.key==='Enter')adminLogin()">
    <div id="adm-err" class="login-err"></div>
    <button class="login-btn" onclick="adminLogin()">AUTHENTICATE</button>
  </div>
</div>

<div id="pg-admin">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="topbar-logo">CREW<span>OS</span></div>
      <div class="topbar-tag">ADMIN</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-time" id="adm-clock"></div>
      <button class="btn-logout" onclick="adminLogout()">LOGOUT</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="sidebar">
      <div class="sidebar-section">Overview</div>
      <div class="nav-item active" id="nav-dashboard" onclick="navTo('dashboard')">
        <span class="nav-icon">◈</span> Dashboard
        <span class="nav-badge" id="nb-biz">—</span>
      </div>
      <div class="sidebar-section">Data</div>
      <div class="nav-item" id="nav-businesses" onclick="navTo('businesses')">
        <span class="nav-icon">◻</span> Businesses
      </div>
      <div class="nav-item" id="nav-phones" onclick="navTo('phones')">
        <span class="nav-icon">◻</span> Phone Index
      </div>
      <div class="nav-item" id="nav-reports" onclick="navTo('reports')">
        <span class="nav-icon">◻</span> Daily Reports
      </div>
      <div class="sidebar-section">System</div>
      <div class="nav-item" id="nav-backup" onclick="navTo('backup')">
        <span class="nav-icon">◻</span> Backup
      </div>
    </div>
    <div class="main" id="adm-main">
      <div class="loading">Loading data</div>
    </div>
  </div>
</div>

<script>
var fbConfig={apiKey:"AIzaSyB6Js1Xbas9S_cQ7-Japn12vFGJ8UJ1ous",authDomain:"crewos-fc781.firebaseapp.com",databaseURL:"https://crewos-fc781-default-rtdb.firebaseio.com",projectId:"crewos-fc781",storageBucket:"crewos-fc781.firebasestorage.app",messagingSenderId:"824881537537",appId:"1:824881537537:web:cc8a03746624e9c43f5600"};
var ADMIN_PASSWORD="crewos2025!";
var db,allData={},currentView="dashboard",bizSearch="";

setInterval(function(){var c=document.getElementById("adm-clock");if(c)c.textContent=new Date().toLocaleTimeString("en-GB");},1000);

function adminLogin(){
  var p=document.getElementById("adm-pass").value;
  var e=document.getElementById("adm-err");
  e.textContent="";
  if(!p){e.textContent="Password required";return;}
  if(p!==ADMIN_PASSWORD){e.textContent="Invalid password";return;}
  if(!firebase.apps.length)firebase.initializeApp(fbConfig);
  db=firebase.database();
  document.getElementById("pg-login").style.display="none";
  document.getElementById("pg-admin").classList.add("on");
  loadAllData();
}
function adminLogout(){
  document.getElementById("pg-login").style.display="";
  document.getElementById("pg-admin").classList.remove("on");
  document.getElementById("adm-pass").value="";
  allData={};
}

async function loadAllData(){
  document.getElementById("adm-main").innerHTML='<div class="loading">Loading data</div>';
  try{
    var snap=await db.ref("/").once("value");
    allData=snap.val()||{};
    var bizCount=Object.keys(allData.businesses||{}).length;
    var nb=document.getElementById("nb-biz"); if(nb)nb.textContent=bizCount;
    renderView(currentView);
  }catch(e){
    document.getElementById("adm-main").innerHTML='<div class="empty" style="color:var(--red)">Firebase error: '+e.message+'</div>';
  }
}

function navTo(view){
  currentView=view;
  ["dashboard","businesses","phones","reports","backup"].forEach(function(v){
    var el=document.getElementById("nav-"+v); if(!el)return;
    el.classList.toggle("active",v===view);
    el.querySelector(".nav-icon").textContent=v===view?"◈":"◻";
  });
  renderView(view);
}
function renderView(v){
  if(v==="dashboard")renderDashboard();
  else if(v==="businesses")renderBusinesses();
  else if(v==="phones")renderPhones();
  else if(v==="reports")renderReports();
  else if(v==="backup")renderBackup();
}

function ri(v){return Math.round(Number(v)||0);}
function fm(v){return "₪"+ri(v);}
function fd(iso){if(!iso)return "—";try{return new Date(iso).toLocaleDateString("he-IL");}catch(e){return iso;}}
function fdt(iso){if(!iso)return "—";try{return new Date(iso).toLocaleString("he-IL");}catch(e){return iso;}}
function sc(label,value,sub,color){return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-value" style="color:'+color+'">'+value+'</div><div class="stat-sub">'+sub+'</div></div>';}
function dr(k,v){return '<div class="detail-row"><div class="detail-key">'+k+'</div><div class="detail-val">'+v+'</div></div>';}

function renderDashboard(){
  var biz=allData.businesses||{},list=Object.entries(biz);
  var totalEmps=0,totalEntries=0,totalRev=0;
  list.forEach(function(p){
    var d=p[1].data||{};
    totalEmps+=(d.emps||[]).length;
    Object.values(d.entries||{}).forEach(function(ee){Object.values(ee).forEach(function(e){totalEntries++;totalRev+=ri(e.total);});});
    Object.values(d.ownerEntries||{}).forEach(function(e){totalEntries++;totalRev+=ri(e.total);});
  });
  var h='<div class="page-header"><div class="page-title">Dashboard</div><div class="page-sub">System overview — all businesses</div></div>';
  h+='<div class="stat-grid">'+sc("Businesses",list.length,"registered","var(--accent)")+sc("Barbers",totalEmps,"across all businesses","var(--blue)")+sc("Work Day Entries",totalEntries,"total logged","var(--green)")+sc("Total Revenue",fm(totalRev),"all time","var(--accent)")+'</div>';
  h+='<div class="table-wrap"><div class="table-head"><div class="table-title">All Businesses</div><div style="display:flex;gap:8px"><button class="btn-sm btn-primary" onclick="loadAllData()">↻ Refresh</button><button class="btn-sm btn-outline" onclick="navTo(\'businesses\')">View All →</button></div></div>';
  h+='<table><thead><tr><th>Business</th><th>Owner</th><th>Phone</th><th>Barbers</th><th>Entries</th><th>Created</th></tr></thead><tbody>';
  list.forEach(function(p){
    var id=p[0],bz=p[1],d=bz.data||{};
    var ec=(d.emps||[]).length,enc=0;
    Object.values(d.entries||{}).forEach(function(ee){enc+=Object.keys(ee).length;});
    enc+=Object.keys(d.ownerEntries||{}).length;
    h+='<tr><td><span style="font-weight:600">'+(d.bizName||bz.bizName||"—")+'</span><br><span class="td-mono td-muted">#'+id+'</span></td>';
    h+='<td>'+(d.ownerName||bz.ownerName||"—")+'</td><td class="td-mono">'+(d.phone||bz.phone||"—")+'</td>';
    h+='<td class="td-mono">'+ec+'</td><td class="td-mono">'+enc+'</td><td class="td-muted">'+fd(bz.createdAt)+'</td></tr>';
  });
  if(!list.length)h+='<tr><td colspan="6"><div class="empty">No businesses registered</div></td></tr>';
  h+='</tbody></table></div>';
  document.getElementById("adm-main").innerHTML=h;
}

function renderBusinesses(){
  var biz=allData.businesses||{},list=Object.entries(biz);
  var filtered=list.filter(function(p){
    if(!bizSearch)return true;
    var q=bizSearch.toLowerCase(),d=p[1].data||{};
    return (d.bizName||"").toLowerCase().includes(q)||(d.ownerName||"").toLowerCase().includes(q)||(d.phone||"").includes(q)||p[0].includes(q);
  });
  var h='<div class="page-header"><div class="page-title">Businesses</div><div class="page-sub">'+list.length+' registered</div></div>';
  h+='<input type="text" class="search-bar" placeholder="Search name, owner, phone, ID..." value="'+bizSearch+'" oninput="bizSearch=this.value;renderBusinesses()">';
  h+='<div class="table-wrap"><div class="table-head"><div class="table-title">Results ('+filtered.length+')</div><button class="btn-sm btn-primary" onclick="loadAllData()">↻ Refresh</button></div>';
  h+='<table><thead><tr><th>ID</th><th>Business</th><th>Owner</th><th>Phone</th><th>Email</th><th>Barbers</th><th>Svcs</th><th>Created</th><th></th></tr></thead><tbody>';
  filtered.forEach(function(p){
    var id=p[0],bz=p[1],d=bz.data||{};
    h+='<tr><td class="td-mono td-muted">'+id+'</td>';
    h+='<td style="font-weight:600">'+(d.bizName||bz.bizName||"—")+'</td>';
    h+='<td>'+(d.ownerName||bz.ownerName||"—")+'</td>';
    h+='<td class="td-mono">'+(d.phone||bz.phone||"—")+'</td>';
    h+='<td class="td-muted" style="font-size:11px">'+(d.ownerEmail||bz.ownerEmail||"—")+'</td>';
    h+='<td class="td-mono">'+(d.emps||[]).length+'</td>';
    h+='<td class="td-mono">'+(d.svcs||[]).length+'</td>';
    h+='<td class="td-muted">'+fd(bz.createdAt)+'</td>';
    h+='<td><button class="btn-sm btn-outline" onclick="showBizDetail(\''+id+'\')">Details</button></td></tr>';
  });
  if(!filtered.length)h+='<tr><td colspan="9"><div class="empty">No results</div></td></tr>';
  h+='</tbody></table></div>';
  document.getElementById("adm-main").innerHTML=h;
}

function showBizDetail(id){
  var bz=(allData.businesses||{})[id]; if(!bz)return;
  var d=bz.data||{},emps=d.emps||[],svcs=d.svcs||[];
  var totalEntries=0,totalRev=0;
  Object.values(d.entries||{}).forEach(function(ee){Object.values(ee).forEach(function(e){totalEntries++;totalRev+=ri(e.total);});});
  Object.values(d.ownerEntries||{}).forEach(function(e){totalEntries++;totalRev+=ri(e.total);});
  var h='<div class="page-header" style="display:flex;align-items:center;gap:12px">';
  h+='<button class="btn-sm btn-outline" onclick="renderBusinesses()">← Back</button>';
  h+='<div><div class="page-title">'+(d.bizName||"Business")+'</div><div class="page-sub">ID: '+id+' · Created: '+fdt(bz.createdAt)+'</div></div></div>';
  h+='<div class="detail-grid"><div class="detail-card"><div class="detail-card-title">Info</div>';
  h+=dr("Business Name",d.bizName||"—")+dr("Owner",d.ownerName||"—")+dr("Phone",d.phone||"—")+dr("Email",d.ownerEmail||bz.ownerEmail||"—")+dr("Monthly Goal",d.goal?fm(d.goal):"—")+dr("Closed Days",Object.keys(d.closedDays||{}).length);
  h+='</div><div class="detail-card"><div class="detail-card-title">Stats</div>';
  h+=dr("Barbers",emps.length)+dr("Global Services",svcs.length)+dr("Work Day Entries",totalEntries)+dr("Total Revenue",fm(totalRev));
  h+='</div></div>';
  if(emps.length){
    h+='<div class="table-wrap"><div class="table-head"><div class="table-title">Barbers ('+emps.length+')</div></div>';
    h+='<table><thead><tr><th>Name</th><th>Role</th><th>Model</th><th>Rate</th><th>Services</th></tr></thead><tbody>';
    emps.forEach(function(e){
      var model=e.pm==="percent"?"Percent":e.pm==="hourly"?"Hourly":e.pm==="chair"?"Chair Rent":"Chair+%";
      var rate=e.pm==="percent"?(e.pct+"%"):e.pm==="hourly"?(fm(e.hr)+"/hr"):e.pm==="chair"?(fm(e.cr)+"/mo"):(fm(e.cr)+"/mo+"+e.pct+"%");
      var ps=(e.svcs&&e.svcs.length)?'<span class="badge badge-blue">'+e.svcs.length+' personal</span>':'<span class="badge badge-yellow">global</span>';
      h+='<tr><td style="font-weight:600">'+e.name+'</td><td class="td-muted">'+e.role+'</td><td>'+model+'</td><td class="td-mono">'+rate+'</td><td>'+ps+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  if(svcs.length){
    h+='<div class="table-wrap"><div class="table-head"><div class="table-title">Global Services</div></div>';
    h+='<table><thead><tr><th>Service</th><th>Price</th><th>ID</th></tr></thead><tbody>';
    svcs.forEach(function(s){h+='<tr><td>'+s.lbl+'</td><td class="td-mono">'+fm(s.price)+'</td><td class="td-mono td-muted">'+s.id+'</td></tr>';});
    h+='</tbody></table></div>';
  }
  document.getElementById("adm-main").innerHTML=h;
}

function renderPhones(){
  var phones=allData.phones||{},emails=allData.emails||{};
  var pl=Object.entries(phones),el=Object.entries(emails);
  var h='<div class="page-header"><div class="page-title">Phone & Email Index</div><div class="page-sub">Login lookup tables</div></div>';
  h+='<div class="tabs"><div class="tab active" id="tab-phones" onclick="switchIdxTab(\'phones\')">Phones ('+pl.length+')</div><div class="tab" id="tab-emails" onclick="switchIdxTab(\'emails\')">Emails ('+el.length+')</div></div>';
  h+='<div id="idx-phones"><div class="table-wrap"><table><thead><tr><th>Phone</th><th>Business ID</th><th>Business Name</th></tr></thead><tbody>';
  pl.forEach(function(p){
    var bname=((allData.businesses||{})[p[1]]||{}).bizName||(((allData.businesses||{})[p[1]]||{}).data||{}).bizName||"—";
    h+='<tr><td class="td-mono">'+p[0]+'</td><td class="td-mono td-muted">'+p[1]+'</td><td>'+bname+'</td></tr>';
  });
  if(!pl.length)h+='<tr><td colspan="3"><div class="empty">No entries</div></td></tr>';
  h+='</tbody></table></div></div>';
  h+='<div id="idx-emails" style="display:none"><div class="table-wrap"><table><thead><tr><th>Email</th><th>Business ID</th></tr></thead><tbody>';
  el.forEach(function(p){h+='<tr><td class="td-mono">'+p[0].replace(/,/g,".")+'</td><td class="td-mono td-muted">'+p[1]+'</td></tr>';});
  if(!el.length)h+='<tr><td colspan="2"><div class="empty">No entries</div></td></tr>';
  h+='</tbody></table></div></div>';
  document.getElementById("adm-main").innerHTML=h;
}
function switchIdxTab(tab){
  document.getElementById("idx-phones").style.display=tab==="phones"?"":"none";
  document.getElementById("idx-emails").style.display=tab==="emails"?"":"none";
  document.getElementById("tab-phones").className="tab"+(tab==="phones"?" active":"");
  document.getElementById("tab-emails").className="tab"+(tab==="emails"?" active":"");
}

function renderReports(){
  var biz=allData.businesses||{},list=Object.entries(biz),reports=[];
  list.forEach(function(p){
    var bizId=p[0],bz=p[1],bizName=(bz.data||{}).bizName||bz.bizName||bizId;
    Object.entries(bz.dailyReports||{}).forEach(function(r){reports.push({bizId:bizId,bizName:bizName,date:r[0],report:r[1]});});
  });
  reports.sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='<div class="page-header"><div class="page-title">Daily Reports</div><div class="page-sub">'+reports.length+' closed-day snapshots</div></div>';
  h+='<div class="table-wrap"><div class="table-head"><div class="table-title">All Closed Days</div></div>';
  h+='<table><thead><tr><th>Date</th><th>Business</th><th>Workers</th><th>Total</th><th>Closed At</th></tr></thead><tbody>';
  reports.forEach(function(r){
    var workers=Object.values(r.report.workers||{});
    var total=workers.reduce(function(s,w){return s+ri(w.gross||0);},0);
    h+='<tr><td class="td-mono" style="font-weight:600">'+r.date+'</td>';
    h+='<td>'+r.bizName+'<br><span class="td-mono td-muted">#'+r.bizId+'</span></td>';
    h+='<td class="td-mono">'+workers.length+'</td>';
    h+='<td class="td-mono" style="color:var(--accent)">'+fm(total)+'</td>';
    h+='<td class="td-muted">'+fdt(r.report.closedAt)+'</td></tr>';
  });
  if(!reports.length)h+='<tr><td colspan="5"><div class="empty">No daily reports found</div></td></tr>';
  h+='</tbody></table></div>';
  document.getElementById("adm-main").innerHTML=h;
}

function renderBackup(){
  var bizCount=Object.keys(allData.businesses||{}).length;
  var h='<div class="page-header"><div class="page-title">Backup</div><div class="page-sub">Export all system data as a single JSON file</div></div>';
  h+='<div class="backup-box"><div class="backup-title">Full System Backup</div>';
  h+='<div class="backup-desc">Downloads <strong style="color:var(--text)">crewos-backup-YYYY-MM-DD.json</strong> containing all businesses, barbers, entries, services, daily reports, phone and email indexes.<br><br><strong style="color:var(--text)">'+bizCount+' businesses</strong> currently in the system.</div>';
  h+='<button class="backup-btn" onclick="doBackup()" id="adm-backup-btn">⬇ Download Backup</button>';
  h+='<div id="adm-backup-msg" class="backup-msg"></div></div>';
  h+='<div class="backup-box"><div class="backup-title">What\'s included</div>';
  h+='<div style="font-family:var(--mono);font-size:12px;color:var(--muted);line-height:2.2">';
  h+='✓ businesses/{id}/data — config, employees, services, entries<br>';
  h+='✓ businesses/{id}/dailyReports — closed day snapshots<br>';
  h+='✓ phones/ — phone → business ID index<br>';
  h+='✓ emails/ — email → business ID index<br>';
  h+='✓ Backup timestamp (ISO 8601)';
  h+='</div></div>';
  document.getElementById("adm-main").innerHTML=h;
}
async function doBackup(){
  var btn=document.getElementById("adm-backup-btn"),msg=document.getElementById("adm-backup-msg");
  if(btn){btn.disabled=true;btn.textContent="Fetching...";}
  if(msg){msg.style.color="var(--muted)";msg.textContent="Pulling fresh data from Firebase...";}
  try{
    var snap=await db.ref("/").once("value");
    var raw=snap.val()||{};
    var d=new Date();
    var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    var payload={backupDate:new Date().toISOString(),businesses:raw.businesses||{},phones:raw.phones||{},emails:raw.emails||{}};
    var json=JSON.stringify(payload,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="crewos-backup-"+ds+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    var kb=Math.round(json.length/1024);
    if(msg){msg.style.color="var(--green)";msg.textContent="✓ Saved: crewos-backup-"+ds+".json ("+kb+" KB)";}
  }catch(e){
    if(msg){msg.style.color="var(--red)";msg.textContent="Error: "+e.message;}
  }finally{
    if(btn){btn.disabled=false;btn.textContent="⬇ Download Backup";}
  }
}
</script>
</body>
</html>
